# ─────────────────────────────────────────────────────────────────────
# CI — Runs on every pull request to validate code quality
# ─────────────────────────────────────────────────────────────────────
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── API (NestJS) ─────────────────────────────────────────────────
  api:
    name: API — Typecheck & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: TypeScript type-check
        run: npx tsc -p apps/api/tsconfig.json --noEmit

      - name: Run tests
        run: npm run test --workspace apps/api
        env:
          JWT_SECRET: ci-test-secret
          FIREBASE_PROJECT_ID: vanta-lab-ci
          FIREBASE_STORAGE_BUCKET: vanta-lab-ci.firebasestorage.app
          FIRESTORE_EMULATOR_HOST: 127.0.0.1:8080
          FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099

  # ── Web (Next.js) ───────────────────────────────────────────────
  web:
    name: Web — Build check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Next.js build
        run: npm run build --workspace apps/web
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: placeholder-api-key
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: vanta-lab-ci.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: vanta-lab-ci
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: vanta-lab-ci.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:placeholder"
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
          STRIPE_SECRET_KEY: sk_test_placeholder
