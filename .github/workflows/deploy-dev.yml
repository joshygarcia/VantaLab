name: Deploy Dev API

on:
  push:
    branches-ignore:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-dev-${{ github.ref }}
  cancel-in-progress: true

env:
  GCP_REGION: us-east1
  ARTIFACT_REGISTRY: us-east1-docker.pkg.dev

jobs:
  deploy-api-dev:
    name: Deploy API -> Cloud Run (dev)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT_ID: ${{ secrets.DEV_GCP_PROJECT_ID }}
      WIF_PROVIDER: ${{ secrets.DEV_WIF_PROVIDER }}
      WIF_SERVICE_ACCOUNT: ${{ secrets.DEV_WIF_SERVICE_ACCOUNT }}
      GCP_CREDENTIALS_JSON: ${{ secrets.DEV_GCP_CREDENTIALS_JSON }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate dev configuration
        run: |
          if [[ -z "$GCP_PROJECT_ID" ]]; then
            echo "::error::Missing DEV_GCP_PROJECT_ID secret."
            exit 1
          fi

          if [[ -n "$WIF_PROVIDER" && -n "$WIF_SERVICE_ACCOUNT" ]]; then
            echo "Using Workload Identity Federation authentication."
            exit 0
          fi

          if [[ -n "$GCP_CREDENTIALS_JSON" ]]; then
            echo "Using service account JSON authentication."
            exit 0
          fi

          echo "::error::Missing dev GCP auth secrets. Configure either DEV_WIF_PROVIDER + DEV_WIF_SERVICE_ACCOUNT, or DEV_GCP_CREDENTIALS_JSON."
          exit 1

      - id: branch-meta
        name: Derive branch-safe service name
        run: |
          BRANCH_SLUG=$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9-]#-#g' | sed 's#-\+#-#g' | sed 's#^-##; s#-$##' | cut -c1-30)
          if [[ -z "$BRANCH_SLUG" ]]; then
            BRANCH_SLUG="dev"
          fi

          API_SERVICE_NAME="persona-api-dev-${BRANCH_SLUG}"
          IMAGE_TAG="${BRANCH_SLUG}-${GITHUB_SHA}"

          echo "BRANCH_SLUG=$BRANCH_SLUG" >> $GITHUB_ENV
          echo "API_SERVICE_NAME=$API_SERVICE_NAME" >> $GITHUB_ENV
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - id: auth-wif
        if: ${{ env.WIF_PROVIDER != '' && env.WIF_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.DEV_WIF_PROVIDER }}
          service_account: ${{ secrets.DEV_WIF_SERVICE_ACCOUNT }}

      - id: auth-json
        if: ${{ !(env.WIF_PROVIDER != '' && env.WIF_SERVICE_ACCOUNT != '') && env.GCP_CREDENTIALS_JSON != '' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.DEV_GCP_CREDENTIALS_JSON }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Prisma migrations (dev)
        run: npm run prisma:migrate:deploy --workspace apps/api
        env:
          DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DEV_DIRECT_URL }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

      - name: Build and push Docker image
        working-directory: apps/api
        run: |
          IMAGE="${{ env.ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/persona/${{ env.API_SERVICE_NAME }}:${{ env.IMAGE_TAG }}"
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Cloud Run (dev)
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.API_SERVICE_NAME }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.IMAGE }}
          flags: >-
            --allow-unauthenticated
            --min-instances=0
            --max-instances=3
            --memory=512Mi
            --cpu=1
            --timeout=300
            --set-env-vars=NODE_ENV=development,FRONTEND_URL=http://localhost:3000
          secrets: |
            DATABASE_URL=DEV_DATABASE_URL:latest
            DIRECT_URL=DEV_DIRECT_URL:latest
            JWT_SECRET=DEV_JWT_SECRET:latest
            SUPABASE_URL=DEV_SUPABASE_URL:latest
            SUPABASE_ANON_KEY=DEV_SUPABASE_ANON_KEY:latest
            SUPABASE_SERVICE_ROLE_KEY=DEV_SUPABASE_SERVICE_ROLE_KEY:latest
            REDIS_URL=DEV_REDIS_URL:latest
            STRIPE_SECRET_KEY=DEV_STRIPE_SECRET_KEY:latest
            STRIPE_WEBHOOK_SECRET=DEV_STRIPE_WEBHOOK_SECRET:latest

      - name: Print dev API URL
        run: |
          echo "Dev API deployed for branch: ${GITHUB_REF_NAME}"
          echo "Service: ${{ env.API_SERVICE_NAME }}"
          echo "Base URL: ${{ steps.deploy.outputs.url }}/api/v1"
