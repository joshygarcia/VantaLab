name: Cleanup Dev API Services

on:
  delete:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

env:
  GCP_REGION: us-east1

jobs:
  cleanup-dev-service:
    name: Cleanup branch-scoped Cloud Run service
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'delete' && github.event.ref_type == 'branch') ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT_ID: ${{ secrets.DEV_GCP_PROJECT_ID }}
      WIF_PROVIDER: ${{ secrets.DEV_WIF_PROVIDER }}
      WIF_SERVICE_ACCOUNT: ${{ secrets.DEV_WIF_SERVICE_ACCOUNT }}
      GCP_CREDENTIALS_JSON: ${{ secrets.DEV_GCP_CREDENTIALS_JSON }}

    steps:
      - name: Validate dev GCP configuration
        run: |
          if [[ -z "$GCP_PROJECT_ID" ]]; then
            echo "::error::Missing DEV_GCP_PROJECT_ID secret."
            exit 1
          fi

          if [[ -n "$WIF_PROVIDER" && -n "$WIF_SERVICE_ACCOUNT" ]]; then
            echo "Using Workload Identity Federation authentication."
            exit 0
          fi

          if [[ -n "$GCP_CREDENTIALS_JSON" ]]; then
            echo "Using service account JSON authentication."
            exit 0
          fi

          echo "::error::Missing dev GCP auth secrets. Configure either DEV_WIF_PROVIDER + DEV_WIF_SERVICE_ACCOUNT, or DEV_GCP_CREDENTIALS_JSON."
          exit 1

      - id: auth-wif
        if: ${{ env.WIF_PROVIDER != '' && env.WIF_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.DEV_WIF_PROVIDER }}
          service_account: ${{ secrets.DEV_WIF_SERVICE_ACCOUNT }}

      - id: auth-json
        if: ${{ !(env.WIF_PROVIDER != '' && env.WIF_SERVICE_ACCOUNT != '') && env.GCP_CREDENTIALS_JSON != '' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.DEV_GCP_CREDENTIALS_JSON }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - id: derive-service
        name: Derive service name from branch
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "delete" ]]; then
            BRANCH_NAME="${{ github.event.ref }}"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BRANCH_NAME="${{ github.event.pull_request.head.ref }}"
          else
            BRANCH_NAME="${{ github.ref_name }}"
          fi

          BRANCH_SLUG=$(echo "$BRANCH_NAME" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9-]#-#g' | sed 's#-\+#-#g' | sed 's#^-##; s#-$##' | cut -c1-30)
          if [[ -z "$BRANCH_SLUG" ]]; then
            echo "::error::Unable to derive branch slug from '$BRANCH_NAME'."
            exit 1
          fi

          SERVICE_NAME="persona-api-dev-${BRANCH_SLUG}"
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
          echo "BRANCH_SLUG=$BRANCH_SLUG" >> $GITHUB_ENV
          echo "SERVICE_NAME=$SERVICE_NAME" >> $GITHUB_ENV

      - name: Delete Cloud Run service if present
        shell: bash
        run: |
          echo "Target branch: $BRANCH_NAME"
          echo "Target service: $SERVICE_NAME"

          if gcloud run services describe "$SERVICE_NAME" --region="$GCP_REGION" --project="$GCP_PROJECT_ID" >/dev/null 2>&1; then
            gcloud run services delete "$SERVICE_NAME" --region="$GCP_REGION" --project="$GCP_PROJECT_ID" --quiet
            echo "Deleted Cloud Run service: $SERVICE_NAME"
          else
            echo "Service not found, nothing to delete: $SERVICE_NAME"
          fi
