# ─────────────────────────────────────────────────────────────────────
# Deploy — Builds and deploys to Google Cloud Run on merge to main
# ─────────────────────────────────────────────────────────────────────
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual trigger from GitHub UI

concurrency:
  group: deploy
  cancel-in-progress: false # Never cancel an in-progress deploy

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: us-central1
  API_SERVICE_NAME: vanta-api
  ARTIFACT_REGISTRY: us-central1-docker.pkg.dev
  AR_REPO: vanta

jobs:
  # ── Deploy API to Cloud Run ─────────────────────────────────────
  deploy-api:
    name: Deploy API → Cloud Run
    runs-on: ubuntu-latest
    needs: []
    permissions:
      contents: read
      id-token: write
    env:
      GCP_CREDENTIALS_JSON: ${{ secrets.GCP_CREDENTIALS_JSON }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate GCP auth configuration
        run: |
          if [[ -z "${{ secrets.GCP_CREDENTIALS_JSON }}" ]]; then
            echo "::error::Missing GCP_CREDENTIALS_JSON secret. Set it to the JSON key of the github-deployer service account in vanta-lab-prod."
            exit 1
          fi
          if [[ -z "${{ secrets.GCP_PROJECT_ID }}" ]]; then
            echo "::error::Missing GCP_PROJECT_ID secret. Should be 'vanta-lab-prod'."
            exit 1
          fi
          echo "Using service account JSON authentication for project ${{ secrets.GCP_PROJECT_ID }}."

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS_JSON }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

      - name: Build & push Docker image
        working-directory: apps/api
        run: |
          IMAGE="${{ env.ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.API_SERVICE_NAME }}:${{ github.sha }}"
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.API_SERVICE_NAME }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.IMAGE }}
          flags: >-
            --allow-unauthenticated
            --min-instances=0
            --max-instances=10
            --memory=512Mi
            --cpu=1
            --timeout=300
            --set-env-vars=NODE_ENV=production
          secrets: |
            JWT_SECRET=JWT_SECRET:latest
            FIREBASE_PROJECT_ID=FIREBASE_PROJECT_ID:latest
            FIREBASE_STORAGE_BUCKET=FIREBASE_STORAGE_BUCKET:latest
            FIREBASE_SERVICE_ACCOUNT_JSON=FIREBASE_SERVICE_ACCOUNT_JSON:latest
            FRONTEND_URL=FRONTEND_URL:latest
            STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest
            STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest

      - name: Show deployment URL
        run: |
          echo "✅ API deployed to:"
          gcloud run services describe ${{ env.API_SERVICE_NAME }} \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.url)'

  # ── Deploy Web to Vercel ────────────────────────────────────────
  deploy-web:
    name: Deploy Web → Vercel
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Validate Vercel project configuration
        run: |
          if [[ -z "$VERCEL_ORG_ID" || -z "$VERCEL_PROJECT_ID" ]]; then
            echo "::error::Missing VERCEL_ORG_ID or VERCEL_PROJECT_ID. Configure both to pin deployments to the Vercel project."
            exit 1
          fi

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
